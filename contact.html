<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CONTACT ME | My Site 1</title>
  <link rel="icon" type="image/svg+xml" href="favicon.svg">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
  <header class="site-header">
    <h1><a href="index.html">Welcom to my Portfolio</a></h1>
  </header>
  <main class="container content">
    <section class="contact-section">
      <div class="contact-info">
        <h2>CONTACT</h2>
        <p>Tel:+86 13552531876<br>Mail:1120705724@qq.com</p>
        <p>Wechat:ffgggwkedk</p>
      </div>
      <div class="contact-form">
        <form id="contact-form">
          <label for="first-name">First Name</label>
          <input type="text" id="first-name" name="first-name">
          <label for="last-name">Last Name</label>
          <input type="text" id="last-name" name="last-name">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required>
          <label for="subject">Subject</label>
          <input type="text" id="subject" name="subject">
          <label for="message">Leave us a message...</label>
          <textarea id="message" name="message"></textarea>
          <button type="submit">Submit</button>
        </form>
      </div>
    </section>
  </main>
  <footer class="site-footer">
    <nav class="footer-nav">
    <a href="index.html">PORTFOLIO</a>
    <a href="about.html">ABOUT ME</a>
    <a href="contact.html" class="active">CONTACT ME</a>
    <a href="projects.html">PROJECTS</a>
    <a href="interesting-things.html">INTERESTING THINGS</a>
    </nav>
    <p class="footer-copyright">
      <script>document.write("\u00a9 " + new Date().getFullYear() + " by Qi Wen")</script>
    </p>
  </footer>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <script>
(function() {
  var EMAILJS_PUBLIC_KEY = 'zdcqvIszo3doWZyAB';
  var EMAILJS_SERVICE_ID = 'service_8zwbmlu';
  var EMAILJS_TEMPLATE_ID = 'template_rnm6m9i';

  emailjs.init(EMAILJS_PUBLIC_KEY);

  var form = document.getElementById('contact-form');

  form.addEventListener('submit', function(e) {
    e.preventDefault();

    var email = form.querySelector('[name="email"]');
    if (!email.value.trim()) {
      email.style.borderColor = 'red';
      email.focus();
      return;
    }

    var btn = form.querySelector('button');
    var params = {
      first_name: form.querySelector('[name="first-name"]').value,
      last_name: form.querySelector('[name="last-name"]').value,
      email: email.value,
      subject: form.querySelector('[name="subject"]').value,
      message: form.querySelector('[name="message"]').value
    };

    btn.textContent = 'Sending...';
    btn.disabled = true;

    emailjs.send(EMAILJS_SERVICE_ID, EMAILJS_TEMPLATE_ID, params)
      .then(function() {
        btn.textContent = 'Sent!';
        btn.style.background = '#4CAF50';
        form.reset();
        setTimeout(function() {
          btn.textContent = 'Submit';
          btn.style.background = '';
          btn.disabled = false;
        }, 3000);
      }, function(error) {
        btn.textContent = 'Error - try again';
        btn.style.background = '#f44336';
        console.error('EmailJS error:', error);
        setTimeout(function() {
          btn.textContent = 'Submit';
          btn.style.background = '';
          btn.disabled = false;
        }, 3000);
      });
  });
})();
  </script>
</body>
</html>
